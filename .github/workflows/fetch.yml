name: Fetch V2Ray Configurations (Stable Push)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install requirements
        run: pip install requests

      - name: Run script
        run: python fetch_subs.py

      - name: Commit changes (safe sync push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.txt state.json 2>/dev/null || true

          git diff --cached --quiet && exit 0

          git commit -m "🔄 Auto-update proxies"

          # 🔥 CRITICAL FIX: always sync before push
          git pull --rebase origin main --autostash

          git push origin main
